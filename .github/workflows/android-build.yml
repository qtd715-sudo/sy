name: Android 빌드 (APK + AAB)

# 회사망에서 dl.google.com(Android SDK/Gradle) 다운로드가 막혀 로컬 빌드가 불가하므로,
# 클린 네트워크인 GitHub Actions 러너에서 빌드해 아티팩트로 제공한다.
#
# 결과물 (Actions 탭 → 해당 실행 → Artifacts):
#   • sy-valuation-debug-apk  : 서명 없는 디버그 APK. 폰에 사이드로드(설치)용.
#   • sy-valuation-release-aab: 서명된 릴리스 AAB. Play Console 업로드용 (서명 시크릿 설정 시에만 생성).
#
# Play Console 업로드에 필요한 GitHub Secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64   - keystore(.jks) 파일을 base64 인코딩한 값
#   ANDROID_KEYSTORE_PASSWORD - keystore 비밀번호
#   ANDROID_KEY_ALIAS         - 키 별칭 (예: sy-upload)
#   ANDROID_KEY_PASSWORD      - 키 비밀번호
# 시크릿이 없으면 AAB 단계는 건너뛰고 디버그 APK 만 생성된다.
#
# android/ 디렉터리는 .gitignore 라 커밋되지 않으므로, CI 에서 `cap add android` 로 재생성한다.

on:
  workflow_dispatch: {}            # Actions 탭에서 수동 실행 버튼
  push:
    paths:
      - 'sy_valuation_app/**'
      - '.github/workflows/android-build.yml'

permissions:
  contents: read

concurrency:
  group: android-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sy_valuation_app
    steps:
      - uses: actions/checkout@v4

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK 설정
        uses: android-actions/setup-android@v3

      - name: 의존성 설치
        run: npm install

      - name: 아이콘/스플래시 생성 (실패해도 빌드 진행)
        run: npx capacitor-assets generate --iconBackgroundColor '#0a0a0a' --splashBackgroundColor '#0a0a0a' || true

      - name: Android 플랫폼 추가
        run: npx cap add android

      - name: 웹/설정 동기화
        run: npx cap sync android

      - name: targetSdk/compileSdk 35 로 상향 (Play 정책 = API 35+ 타게팅 필수)
        run: |
          sed -i -E 's/(compileSdkVersion = )[0-9]+/\135/; s/(targetSdkVersion = )[0-9]+/\135/' android/variables.gradle
          # Capacitor 6 의 AGP(8.2.x)는 compileSdk 35 를 아직 공식 지원 안 하므로 경고 억제(빌드는 정상)
          echo "android.suppressUnsupportedCompileSdk=35" >> android/gradle.properties
          grep -E 'compileSdkVersion|targetSdkVersion' android/variables.gradle

      - name: versionCode 를 실행번호로 설정 (Play Console 중복 업로드 방지)
        run: |
          sed -i "s/versionCode .*/versionCode ${{ github.run_number }}/" android/app/build.gradle
          grep -n "versionCode\|versionName" android/app/build.gradle

      - name: Debug APK 빌드
        working-directory: sy_valuation_app/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: APK 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: sy-valuation-debug-apk
          path: sy_valuation_app/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      # ---- 여기서부터는 서명 시크릿이 설정된 경우에만 실행 (Play Console 용 AAB) ----

      - name: 서명 시크릿 존재 확인
        id: signcheck
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::서명 시크릿(ANDROID_KEYSTORE_BASE64 등)이 없어 릴리스 AAB 를 건너뜁니다. 디버그 APK 만 생성됩니다."
          fi

      - name: 릴리스 AAB 빌드
        if: steps.signcheck.outputs.ready == 'true'
        working-directory: sy_valuation_app/android
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: AAB 서명 + 검증
        if: steps.signcheck.outputs.ready == 'true'
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # 붙여넣기 오염에 견고하게: base64 알파벳(A-Za-z0-9+/)만 남기고 padding 을 재계산.
          # 공백/CR/제어문자/깨진 padding 을 모두 복구한 뒤 디코딩 → base64: invalid input 방지.
          CLEAN=$(printf '%s' "$KS_B64" | tr -cd 'A-Za-z0-9+/')
          MOD=$(( ${#CLEAN} % 4 ))
          if [ "$MOD" -eq 2 ]; then CLEAN="${CLEAN}=="; elif [ "$MOD" -eq 3 ]; then CLEAN="${CLEAN}="; fi
          printf '%s' "$CLEAN" | base64 -d > "$RUNNER_TEMP/upload.jks"
          echo "keystore 크기: $(wc -c < "$RUNNER_TEMP/upload.jks") bytes (정상=2638)"
          # 키 접근 확인 (비번/별칭 틀리면 여기서 명확히 실패)
          keytool -list -keystore "$RUNNER_TEMP/upload.jks" -storepass "$KS_PASS" -alias "$KEY_ALIAS" >/dev/null
          AAB=android/app/build/outputs/bundle/release/app-release.aab
          jarsigner -keystore "$RUNNER_TEMP/upload.jks" \
            -storepass "$KS_PASS" -keypass "$KEY_PASS" \
            -sigalg SHA256withRSA -digestalg SHA-256 \
            "$AAB" "$KEY_ALIAS"
          jarsigner -verify "$AAB"
          cp "$AAB" android/app/build/outputs/bundle/release/sy-valuation-release.aab
          rm -f "$RUNNER_TEMP/upload.jks"

      - name: AAB 아티팩트 업로드
        if: steps.signcheck.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sy-valuation-release-aab
          path: sy_valuation_app/android/app/build/outputs/bundle/release/sy-valuation-release.aab
          if-no-files-found: error
          retention-days: 30
