name: Android APK 빌드

# 회사망에서 dl.google.com(Android SDK/Gradle) 다운로드가 막혀 로컬 빌드가 불가하므로,
# 클린 네트워크인 GitHub Actions 러너에서 APK 를 빌드해 아티팩트로 제공한다.
#
# 결과물: Actions 탭 → 해당 실행 → Artifacts → "sy-valuation-debug-apk" 다운로드.
# debug APK 는 서명 없이 폰에 사이드로드(설치) 가능 (설정 > 출처를 알 수 없는 앱 허용).
#
# android/ 디렉터리는 .gitignore 라 커밋되지 않으므로, CI 에서 `cap add android` 로 재생성한다.

on:
  workflow_dispatch: {}            # Actions 탭에서 수동 실행 버튼
  push:
    paths:
      - 'sy_valuation_app/**'
      - '.github/workflows/android-build.yml'

permissions:
  contents: read

concurrency:
  group: android-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sy_valuation_app
    steps:
      - uses: actions/checkout@v4

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK 설정
        uses: android-actions/setup-android@v3

      - name: 의존성 설치
        run: npm install

      - name: 아이콘/스플래시 생성 (실패해도 빌드 진행)
        run: npx capacitor-assets generate --iconBackgroundColor '#0a0a0a' --splashBackgroundColor '#0a0a0a' || true

      - name: Android 플랫폼 추가
        run: npx cap add android

      - name: 웹/설정 동기화
        run: npx cap sync android

      - name: Debug APK 빌드
        working-directory: sy_valuation_app/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: APK 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: sy-valuation-debug-apk
          path: sy_valuation_app/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
