name: Keep-alive + Prefetch

# Render 무료 티어는 15분 미사용 시 sleep.
# 이 워크플로가 매 14분마다 ping → 절대 sleep 하지 않음.
# 또한 매일 새벽 3시(KST) 에 강제 prefetch 실행 → 데이터 fresh 보장.

on:
  schedule:
    - cron: "*/14 * * * *"   # 매 14분 (UTC, GitHub Actions cron)
    - cron: "0 18 * * *"     # 매일 03:00 KST (UTC 18:00) — 일일 prefetch
  workflow_dispatch:          # 수동 실행 버튼

# 동시 실행 1개로 제한 (cron 중복 방지)
concurrency:
  group: keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Show config
        run: |
          if [ -z "${{ vars.SY_URL }}" ]; then
            echo "::error::Repository variable SY_URL 이 설정되지 않았습니다."
            echo "Settings → Secrets and variables → Actions → Variables 에서 SY_URL 추가하세요."
            echo "예: https://sy-valuation.onrender.com"
            exit 1
          fi
          echo "URL: ${{ vars.SY_URL }}"
          echo "Schedule: ${{ github.event.schedule }}"

      - name: Health ping (keep-alive)
        run: |
          set +e
          for i in 1 2 3; do
            code=$(curl -sS -o /tmp/health.json -m 30 -w "%{http_code}" "${{ vars.SY_URL }}/api/health")
            echo "attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              cat /tmp/health.json
              break
            fi
            sleep 10
          done

      - name: Force prefetch (daily, 03:00 KST)
        if: github.event.schedule == '0 18 * * *' || github.event_name == 'workflow_dispatch'
        run: |
          curl -sS -m 60 "${{ vars.SY_URL }}/api/prefetch" | head -c 2000
