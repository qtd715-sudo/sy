name: Keep-alive + Daily Refresh

# Render 무료 티어는 15분 미사용 시 sleep.
# - 매 14분 ping 으로 sleep 방지
# - 매일 06:00 KST: 대시보드 시세/원자재/지수 갱신
# - 매일 09:00 KST: 뉴스 (시장 + 토픽) 갱신
#
# GitHub Actions cron 은 UTC 기준:
#   KST 06:00 → UTC 21:00 (전날)
#   KST 09:00 → UTC 00:00

on:
  schedule:
    # Render 무료 티어 sleep 임계가 15분. GitHub Actions cron 은 종종 1~5분
    # 지연되므로 10분 cron + 5분 오프셋(0/5/10/15/...) 으로 분산 ping →
    # 실측 ping 간격 평균 ≈ 5-7분, 최악 ≈ 12분 < sleep 임계.
    - cron: "*/10 * * * *"   # 매 10분 — keep-alive (메인 슬롯)
    - cron: "5-55/10 * * * *" # 매 10분 (5/15/25/...) — 오프셋 슬롯
    - cron: "0 21 * * *"     # 매일 KST 06:00 — 대시보드 (시세/원자재/지수)
    - cron: "0 0 * * *"      # 매일 KST 09:00 — 뉴스
  workflow_dispatch:
    inputs:
      mode:
        description: '강제 실행 모드'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - market
          - news
          - ping

concurrency:
  group: keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Validate config
        run: |
          if [ -z "${{ vars.SY_URL }}" ]; then
            echo "::error::Repository variable SY_URL 이 설정되지 않았습니다."
            exit 1
          fi
          echo "URL: ${{ vars.SY_URL }}"
          echo "Schedule: ${{ github.event.schedule }}"
          echo "Manual mode: ${{ github.event.inputs.mode }}"

      - name: Health ping (always)
        run: |
          set +e
          for i in 1 2 3; do
            code=$(curl -sS -o /tmp/health.json -m 30 -w "%{http_code}" "${{ vars.SY_URL }}/api/health")
            echo "attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              cat /tmp/health.json | head -c 1000
              break
            fi
            sleep 10
          done

      - name: Warmup hot endpoints (always)
        # /api/health 만 깨우면 다른 페이지 첫 진입 시 5-15초 추가 지연.
        # 자주 쓰는 캐시-친화 엔드포인트를 미리 호출해서 서버 메모리 캐시까지
        # 데워둠. 실패해도 무시.
        run: |
          set +e
          for ep in \
            "/api/commodities" \
            "/api/undervalued?n=10" \
            "/api/sy/undervalued?n=10" \
            "/api/news/market?n=4" \
            "/api/news/topics?n=4"; do
            code=$(curl -sS -o /dev/null -m 20 -w "%{http_code}" "${{ vars.SY_URL }}${ep}")
            echo "warmup ${ep} → ${code}"
          done

      - name: Daily MARKET refresh (KST 06:00)
        if: github.event.schedule == '0 21 * * *' || github.event.inputs.mode == 'market' || github.event.inputs.mode == 'all'
        run: |
          curl -sS -m 90 "${{ vars.SY_URL }}/api/prefetch?type=market" | head -c 2000
          echo ""

      - name: Daily NEWS refresh (KST 09:00)
        if: github.event.schedule == '0 0 * * *' || github.event.inputs.mode == 'news' || github.event.inputs.mode == 'all'
        run: |
          curl -sS -m 180 "${{ vars.SY_URL }}/api/prefetch?type=news" | head -c 2000
          echo ""
