<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>SY Valuation</title>
  <style>
    :root { --bg:#0a0a0a; --fg:#fafaf9; --muted:#737373; --accent:#fafaf9; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg); color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
      -webkit-user-select: none; user-select: none;
    }
    .wrap { text-align: center; max-width: 360px; }
    .logo {
      font-weight: 800; font-size: 64px; letter-spacing: -4px; line-height: 1;
    }
    .sub {
      font-family: ui-monospace, Consolas, monospace;
      font-size: 13px; letter-spacing: 8px; color: var(--muted); margin-top: 10px;
    }
    .status { margin-top: 36px; font-size: 14px; color: var(--muted); min-height: 20px; }
    .spinner {
      margin: 28px auto 0; width: 28px; height: 28px;
      border: 3px solid #262626; border-top-color: var(--fg);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    button {
      margin-top: 28px; padding: 12px 28px; font-size: 15px; font-weight: 600;
      background: var(--fg); color: var(--bg); border: 0; border-radius: 10px;
      cursor: pointer; display: none;
    }
    button:active { opacity: 0.8; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">SY</div>
    <div class="sub">VALUATION</div>
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">연결 중…</div>
    <button id="retry">다시 시도</button>
  </div>

  <script>
    // 이 화면은 로컬 폴백 셸입니다.
    // capacitor.config.json 의 server.url(라이브 서버)이 정상 로드되면 보이지 않습니다.
    // 서버가 잠들어(콜드 스타트) 있거나 오프라인일 때만 노출됩니다.
    var SERVER_URL = "https://sy-valuation.onrender.com/";
    var statusEl = document.getElementById("status");
    var spinner = document.getElementById("spinner");
    var retry = document.getElementById("retry");

    function showOffline(msg) {
      spinner.classList.add("hidden");
      statusEl.textContent = msg || "서버에 연결할 수 없습니다.";
      retry.style.display = "inline-block";
    }

    function attempt() {
      spinner.classList.remove("hidden");
      retry.style.display = "none";
      statusEl.textContent = navigator.onLine ? "서버 깨우는 중… (최대 30초)" : "오프라인 — 네트워크 연결을 확인하세요.";
      if (!navigator.onLine) { return showOffline("오프라인 — 네트워크 연결을 확인하세요."); }

      // 가벼운 헬스체크로 서버 기상 여부 확인 후 전체 앱으로 이동
      var ctrl = new AbortController();
      var timer = setTimeout(function () { ctrl.abort(); }, 35000);
      fetch(SERVER_URL + "api/ping", { signal: ctrl.signal, cache: "no-store" })
        .then(function (r) {
          clearTimeout(timer);
          if (r.ok) { window.location.replace(SERVER_URL); }
          else { showOffline("서버 응답 오류 (" + r.status + ")"); }
        })
        .catch(function () {
          clearTimeout(timer);
          showOffline("서버에 연결할 수 없습니다. 잠시 후 다시 시도하세요.");
        });
    }

    retry.addEventListener("click", attempt);
    window.addEventListener("online", attempt);
    attempt();
  </script>
</body>
</html>
